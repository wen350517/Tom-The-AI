name: Build TomAI-Plus Final
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Auto-Convert Icon Format
        shell: pwsh
        run: |
          if (Test-Path "icon.ico") {
              # Uses ImageMagick (built into the runner) to rewrite the icon
              # into the proper multi-layer Windows format expected by .NET
              magick icon.ico -define icon:auto-resize=256,128,64,48,32,16 icon.ico
          }

      - name: Build App Folder (Nativefier)
        shell: pwsh
        run: |
          # 1. We use a specifically escaped string for Windows/PowerShell to avoid JSON errors
          $metadata = '{\"CompanyName\":\"Wen Zhang\",\"FileDescription\":\"TomAI-Plus Desktop\",\"ProductName\":\"TomAI-Plus\",\"InternalName\":\"TomAI-Plus\"}'
          
          npx --yes nativefier "https://math12393.codeberg.page/Tom-The-AI-Plus-Wen/" `
            --name "TomAI-Plus" --platform "windows" --arch "x64" `
            --electron-version 28.2.0 --single-instance `
            --icon "icon.ico" `
            --app-copyright "Wen Zhang" `
            --win32metadata "$metadata"

          if (Test-Path "TomAI-Plus-win32-x64\locales") {
              Get-ChildItem -Path "TomAI-Plus-win32-x64\locales\*" -Exclude "en-US.pak" | Remove-Item -Force
          }

      - name: Zip the App Folder
        shell: pwsh
        run: |
          Compress-Archive -Path "TomAI-Plus-win32-x64\*" -DestinationPath "app.zip"

      - name: Create Invisible Custom Launcher
        shell: pwsh
        run: |
          dotnet new console -n TomAIPlusWrapper
          $iconTag = if (Test-Path "icon.ico") { "<ApplicationIcon>..\icon.ico</ApplicationIcon>" } else { "" }
          
          # This bakes your name into the Windows Registry/Properties
          $csproj = @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>WinExe</OutputType>
              <TargetFramework>net8.0</TargetFramework>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
              $iconTag
              <AssemblyName>TomAI-Plus</AssemblyName>
              <Authors>Wen Zhang</Authors>
              <Company>Wen Zhang</Company>
              <Product>Tom The AI PLUS</Product>
              <Copyright>Copyright © 2026 Wen Zhang</Copyright>
              <Description>Tom The AI PLUS Desktop Assistant</Description>
            </PropertyGroup>
            <ItemGroup>
              <EmbeddedResource Include="..\app.zip" LogicalName="app.zip" />
            </ItemGroup>
          </Project>
          "@
          $csproj | Out-File -FilePath "TomAIPlusWrapper/TomAIPlusWrapper.csproj" -Encoding utf8
          
          $code = @"
          using System;
          using System.Diagnostics;
          using System.IO;
          using System.IO.Compression;
          using System.Reflection;
          using System.Runtime.InteropServices;

          namespace TomAIPlusWrapper {
              class Program {
                  static void Main() {
                      // Versioned temp folder helps refresh the icon cache
                      string tempDir = Path.Combine(Path.GetTempPath(), "TomAIPlus_v1_Build");
                      string exePath = Path.Combine(tempDir, "TomAI-Plus.exe");

                      try {
                          if (!File.Exists(exePath)) {
                              if (Directory.Exists(tempDir)) Directory.Delete(tempDir, true);
                              Directory.CreateDirectory(tempDir);
                              using (Stream? s = Assembly.GetExecutingAssembly().GetManifestResourceStream("app.zip")) {
                                  if (s == null) return;
                                  using (FileStream fs = new FileStream(Path.Combine(tempDir, "app.zip"), FileMode.Create)) {
                                      s.CopyTo(fs);
                                  }
                              }
                              ZipFile.ExtractToDirectory(Path.Combine(tempDir, "app.zip"), tempDir);
                              File.Delete(Path.Combine(tempDir, "app.zip"));
                          }
                      } catch { }

                      if (File.Exists(exePath)) {
                          Process.Start(new ProcessStartInfo(exePath) { 
                              UseShellExecute = true,
                              WorkingDirectory = tempDir 
                          });
                      }
                  }
              }
          }
          "@
          $code | Out-File -FilePath "TomAIPlusWrapper/Program.cs" -Encoding utf8

      - name: Publish Final Single EXE
        shell: pwsh
        run: |
          cd TomAIPlusWrapper
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ../Output
          cd ..

      - name: Upload Final App
        uses: actions/upload-artifact@v4
        with:
          name: TomAI-Plus-Windows-App
          path: Output/TomAI-Plus.exe
