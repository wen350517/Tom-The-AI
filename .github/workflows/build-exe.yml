name: Build TomAI-Plus macOS
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Nativefier
        run: npm install -g nativefier

      - name: Build .app with Nativefier
        run: |
          # Using icon.png because it is in your repo root as seen in screenshot
          nativefier "https://math12393.codeberg.page/Tom-The-AI-Plus-Wen/" \
          --name "TomAI-Plus" \
          --platform "darwin" \
          --arch "universal" \
          --icon "./icon.png" \
          --internal-urls ".*" \
          --app-version "1.0.0" \
          ./build

      - name: Package to DMG
        run: |
          mkdir dmg_root
          # Copy the generated .app to the DMG folder
          cp -R ./build/TomAI-Plus-darwin-universal/TomAI-Plus.app ./dmg_root/
          
          # Add the Applications shortcut for the installer
          ln -s /Applications ./dmg_root/Applications
          
          # Create the DMG using native macOS tools
          hdiutil create -volname "TomAI-Plus-Installer" \
          -srcfolder ./dmg_root \
          -ov -format UDZO \
          TomAI-Plus-macOS.dmg

      - name: Upload Finished DMG
        uses: actions/upload-artifact@v4
        with:
          name: TomAI-Plus-macOS-DMG
          path: TomAI-Plus-macOS.dmg
